name: Build Docker Image for Hugging Face

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/huggingface-docker.yml'
      - '.dockerignore'
      - 'Dockerfile.huggingface'
      - 'main.py'
      - 'requirements.txt'
      - 'src/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/huggingface-docker.yml'
      - '.dockerignore'
      - 'Dockerfile.huggingface'
      - 'main.py'
      - 'requirements.txt'
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: huggingface-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Hugging Face image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.huggingface
          platforms: linux/amd64
          provenance: false
          tags: ohmycaptcha:hf-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
